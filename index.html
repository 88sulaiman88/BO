<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دليل عروض البطاقات البنكية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f8fc;
      --panel: #ffffff;
      --text: #101828;
      --muted: #667085;
      --line: #e6e8ef;
      --accent: #3b82f6;
      --accent-soft: #eff6ff;
      --danger: #ef4444;
      --danger-soft: #fef2f2;
      --shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Tajawal", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(59,130,246,.08), transparent 26%),
        linear-gradient(180deg, #fbfcff 0%, #f4f6fb 100%);
      min-height: 100vh;
    }
    .page {
      width: min(1120px, calc(100% - 24px));
      margin: 28px auto 40px;
    }
    .hero {
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 28px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .subtitle {
      margin: 10px auto 0;
      color: var(--muted);
      font-size: 15px;
    }
    .search-wrap {
      margin: 22px auto 0;
      max-width: 820px;
      position: relative;
    }
    .search {
      width: 100%;
      height: 60px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 22px;
      font: inherit;
      font-size: 18px;
      background: #fff;
      box-shadow: inset 0 1px 2px rgba(16,24,40,.04);
      outline: none;
    }
    .search:focus {
      border-color: rgba(59,130,246,.45);
      box-shadow: 0 0 0 4px rgba(59,130,246,.12);
    }
    .controls {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--muted);
    }
    .checkbox {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--text);
    }
    .checkbox input { accent-color: var(--accent); }
    .reset-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
    }
    .meta-bar {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.9);
      border: 1px solid var(--line);
      padding: 9px 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .pill strong { color: var(--text); }
    .results {
      margin-top: 24px;
    }
    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 15px;
      padding: 0 4px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 22px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(16,24,40,.11);
    }
    .card.expired {
      border-color: rgba(239,68,68,.25);
      background: linear-gradient(180deg, #fff, var(--danger-soft));
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .bank {
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }
    .expired-badge {
      color: var(--danger);
      background: var(--danger-soft);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.5;
    }
    .discount {
      font-size: 16px;
      font-weight: 800;
    }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .details {
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
      margin: 0;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: auto;
      flex-wrap: wrap;
    }
    .link {
      color: var(--accent);
      text-decoration: none;
      background: var(--accent-soft);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 700;
    }
    .empty, .error {
      background: rgba(255,255,255,.92);
      border: 1px dashed var(--line);
      box-shadow: var(--shadow);
      border-radius: 22px;
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
    }
    .error {
      border-color: rgba(239,68,68,.25);
      color: #991b1b;
      background: #fff7f7;
    }
    @media (max-width: 640px) {
      .page { width: min(100% - 14px, 1120px); margin-top: 12px; }
      .hero { padding: 18px; border-radius: 22px; }
      .search { height: 54px; font-size: 17px; }
      .summary { flex-direction: column; align-items: flex-start; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>دليل عروض البطاقات البنكية</h1>
      <p class="subtitle">ابحث باسم المتجر أو العلامة أو العرض</p>
      <div class="search-wrap">
        <input id="searchInput" class="search" type="text" placeholder="مثال: بول، شاورمر، هنقرستيشن، فوغو" autocomplete="off" />
      </div>
      <div class="controls">
        <label class="checkbox"><input type="checkbox" id="hideExpired" checked> إخفاء العروض المنتهية</label>
        <button id="resetBtn" class="reset-btn" type="button">إعادة</button>
      </div>
      <div class="meta-bar">
        <div class="pill">العروض: <strong id="statOffers">0</strong></div>
        <div class="pill">البنوك: <strong id="statBanks">0</strong></div>
        <div class="pill">المعروض الآن: <strong id="statShown">0</strong></div>
        <div class="pill">آخر تحديث: <strong id="generatedAt">—</strong></div>
      </div>
    </section>

    <section class="results">
      <div class="summary">
        <div id="summaryLine">جارٍ تحميل العروض...</div>
      </div>
      <div id="cards" class="cards"></div>
    </section>
  </main>

  <script>
    let allOffers = [];
    let dataMeta = { generated_at: '' };

    const els = {
      searchInput: document.getElementById('searchInput'),
      hideExpired: document.getElementById('hideExpired'),
      resetBtn: document.getElementById('resetBtn'),
      cards: document.getElementById('cards'),
      summaryLine: document.getElementById('summaryLine'),
      statOffers: document.getElementById('statOffers'),
      statBanks: document.getElementById('statBanks'),
      statShown: document.getElementById('statShown'),
      generatedAt: document.getElementById('generatedAt'),
    };

    function normalizeArabic(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/[أإآ]/g, 'ا')
        .replace(/ة/g, 'ه')
        .replace(/ى/g, 'ي')
        .replace(/ؤ/g, 'و')
        .replace(/ئ/g, 'ي')
        .replace(/[ـ\-_/.,،]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function levenshtein(a, b) {
      a = normalizeArabic(a);
      b = normalizeArabic(b);
      if (!a) return b.length;
      if (!b) return a.length;
      const matrix = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
      for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
      for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          matrix[i][j] = Math.min(
            matrix[i - 1][j] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j - 1] + cost
          );
        }
      }
      return matrix[a.length][b.length];
    }

    function tokenMatchScore(query, haystack) {
      const q = normalizeArabic(query);
      const h = normalizeArabic(haystack);
      if (!q) return 1;
      if (h.includes(q)) return 3;

      const qTokens = q.split(' ').filter(Boolean);
      const hTokens = h.split(' ').filter(Boolean);
      let score = 0;

      for (const qt of qTokens) {
        if (h.includes(qt)) {
          score += 2;
          continue;
        }
        let best = Infinity;
        for (const ht of hTokens) {
          const d = levenshtein(qt, ht);
          if (d < best) best = d;
          if (best === 0) break;
        }
        const allowed = qt.length <= 4 ? 1 : 2;
        if (best <= allowed) score += 1;
      }
      return score;
    }

    function isMatch(offer, query) {
      if (!query.trim()) return true;
      const primary = [offer.title, offer.merchant, offer.details, offer.discount].join(' ');
      const secondary = [offer.bank, offer.category, ...(offer.cards || [])].join(' ');
      return tokenMatchScore(query, primary) >= 1 || tokenMatchScore(query, secondary) >= 2;
    }

    function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (Number.isNaN(d.getTime())) return dateStr;

  return new Intl.DateTimeFormat('ar-SA', {
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: 'numeric',
    minute: '2-digit'
  }).format(d);
}

    function filterOffers() {
      const query = els.searchInput.value.trim();
      const hideExpired = els.hideExpired.checked;
      return allOffers.filter(offer => {
        if (hideExpired && offer.expired) return false;
        return isMatch(offer, query);
      });
    }

    function createChip(text) {
      const span = document.createElement('span');
      span.className = 'chip';
      span.textContent = text;
      return span;
    }

    function renderOffers() {
      const filtered = filterOffers();
      els.cards.innerHTML = '';
      els.statShown.textContent = String(filtered.length);
      els.summaryLine.textContent = filtered.length
        ? `تم العثور على ${filtered.length} عرض`
        : 'لا توجد نتائج مطابقة';

      if (!filtered.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'جرّب كتابة اسم قريب من المتجر أو احذف بعض الكلمات.';
        els.cards.appendChild(empty);
        return;
      }

      filtered.forEach(offer => {
        const card = document.createElement('article');
        card.className = `card ${offer.expired ? 'expired' : ''}`;

        const top = document.createElement('div');
        top.className = 'top';

        const topLeft = document.createElement('div');
        const bank = document.createElement('div');
        bank.className = 'bank';
        bank.textContent = offer.bank || '—';
        const title = document.createElement('h3');
        title.className = 'title';
        title.textContent = offer.title || offer.merchant || 'عرض';
        topLeft.append(bank, title);
        top.appendChild(topLeft);

        if (offer.expired) {
          const expired = document.createElement('span');
          expired.className = 'expired-badge';
          expired.textContent = 'منتهي';
          top.appendChild(expired);
        }

        const discount = document.createElement('div');
        discount.className = 'discount';
        discount.textContent = offer.discount || 'عرض متاح';

        const chips = document.createElement('div');
        chips.className = 'chips';
        if (offer.merchant && offer.merchant !== offer.title) chips.appendChild(createChip(offer.merchant));
        if (offer.category) chips.appendChild(createChip(offer.category));
        if (offer.valid_until) chips.appendChild(createChip(`ينتهي: ${offer.valid_until}`));

        const details = document.createElement('p');
        details.className = 'details';
        details.textContent = offer.details || '—';

        const footer = document.createElement('div');
        footer.className = 'footer';
        const small = document.createElement('div');
        small.className = 'chip';
        small.textContent = offer.code ? `الكود: ${offer.code}` : '';
        footer.appendChild(small);

        if (offer.source) {
          const link = document.createElement('a');
          link.className = 'link';
          link.href = offer.source;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = 'تفاصيل العرض';
          footer.appendChild(link);
        }

        card.append(top, discount);
        if (chips.childNodes.length) card.appendChild(chips);
        card.append(details, footer);
        els.cards.appendChild(card);
      });
    }

    function renderStats() {
      els.statOffers.textContent = String(allOffers.length);
      els.statBanks.textContent = String(new Set(allOffers.map(o => o.bank).filter(Boolean)).size);
      els.generatedAt.textContent = formatDate(dataMeta.generated_at);
    }

    async function loadData() {
      try {
        const res = await fetch('./all-offers.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        dataMeta = data || {};
        allOffers = Array.isArray(data?.offers) ? data.offers : [];
        renderStats();
        renderOffers();
      } catch (err) {
        els.cards.innerHTML = `<div class="error">تعذر تحميل all-offers.json. تأكد أن الملف موجود بجانب index.html وأن الموقع منشور بشكل صحيح.</div>`;
        els.summaryLine.textContent = 'تعذر تحميل البيانات';
        console.error(err);
      }
    }

    els.searchInput.addEventListener('input', renderOffers);
    els.hideExpired.addEventListener('change', renderOffers);
    els.resetBtn.addEventListener('click', () => {
      els.searchInput.value = '';
      els.hideExpired.checked = true;
      renderOffers();
    });

    loadData();
  </script>
</body>
</html>
