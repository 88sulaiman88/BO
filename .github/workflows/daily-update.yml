name: Daily Offers Update

on:
  schedule:
    - cron: "17 1 * * *"   # يوميًا 4:17 صباحًا بتوقيت السعودية (UTC+3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-offers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run daily updater
        run: node scripts/update-offers.js

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add banks/all-offers.json
          git add banks/*
          git diff --cached --quiet || git commit -m "chore: daily offers update"

      - name: Push changes
        run: git push
