name: Update offers

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-offers
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show repo files
        run: |
          echo "Current directory:"
          pwd
          echo "Repo contents:"
          find . -maxdepth 3 -type f | sort

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch latest bank offers
        run: node scripts/fetch-banks.js

      - name: Build merged offers file
        run: node scripts/update-offers.js

      - name: Commit and push changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add all-offers.json banks/*
          git diff --cached --quiet && exit 0

          git commit -m "Auto-update offers"

          git pull --rebase origin main
          git push origin main
